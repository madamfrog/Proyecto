<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManhwaFrosch</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #121212;
            --header-color: #ff7e5f;
            --accent-color: #feb47b;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --btn-red: #ff4b2b;
        }

        body.light-mode {
            --bg-color: #f0f0f0;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0;
            transition: 0.3s;
        }

        header {
            background: linear-gradient(90deg, var(--header-color), var(--accent-color));
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .manga-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .manga-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #333;
            position: relative;
        }

        .manga-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(255, 126, 95, 0.3);
            border-color: var(--header-color);
        }

        .manga-card img { width: 100%; height: 320px; object-fit: cover; }
        .manga-info { padding: 15px; text-align: center; }
        .manga-info p { color: #bbb; font-size: 0.9rem; margin-bottom: 15px; }
        body.light-mode .manga-info p { color: #555; }

        .btn-read {
            display: inline-block; background-color: var(--btn-red);
            color: white; padding: 10px 20px; text-decoration: none;
            border-radius: 25px; font-weight: 600;
        }

        .badge { background: rgba(255,255,255,0.1); padding: 2px 10px; border-radius: 4px; font-size: 0.7rem; text-transform: uppercase; }

        .filter-btn {
            background: var(--card-bg); color: var(--text-main); border: 1px solid var(--header-color);
            padding: 8px 18px; border-radius: 20px; cursor: pointer; transition: 0.3s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: linear-gradient(90deg, var(--header-color), var(--accent-color));
            border-color: transparent; color: white;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1); width: 40px; height: 40px;
            border-radius: 50%; border-left-color: var(--header-color);
            margin: 0 auto; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<button id="theme-toggle" style="position: fixed; top: 20px; right: 20px; z-index: 1000; padding: 10px; border-radius: 50%; border: none; cursor: pointer; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 1.5rem;">🌙</button>

<header>
    <h1>ManhwaFrosch</h1>
    <p>Mangas, Manhwas, Manhuas y Novelas en un solo lugar</p>
</header>

<div class="filter-menu" style="text-align: center; margin: 20px auto; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;">
    <button class="filter-btn active" data-filter="all">Todos</button>
    <button class="filter-btn" data-filter="shonen">Shonen</button>
    <button class="filter-btn" data-filter="romance">Romance</button>
    <button class="filter-btn" data-filter="novela">Novelas</button> <button class="filter-btn" data-filter="reencarnacion">Reencarnación</button>
    <button class="filter-btn" data-filter="bl">BL</button>
</div>

<div style="max-width: 600px; margin: 30px auto; padding: 0 20px;">
    <input type="text" id="buscador" placeholder="🔍 Buscar por título..." 
           style="width: 100%; padding: 15px; border-radius: 30px; border: 2px solid var(--header-color); background: var(--card-bg); color: var(--text-main); outline: none;">
</div>

<div id="loader" style="display: none; text-align: center; padding: 50px;">
    <div class="spinner"></div>
    <p style="color: var(--header-color); margin-top: 15px; font-weight: 600;">Consultando biblioteca...</p>
</div>

<div class="manga-grid" id="mangaGrid">
    <div class="manga-card" data-tags="novela reencarnacion">
        <img src="https://i.pinimg.com/736x/f1/8f/0e/f18f0e1144c7828a6562442f2efc0b5c.jpg" alt="Lord of the Mysteries">
        <div class="manga-info">
            <span class="badge">Novela</span>
            <h3>Lord of the Mysteries</h3>
            <p>Volumen 1 - Novela</p>
            <a href="#" class="btn-read">Leer Novela</a>
        </div>
    </div>
</div>

<section style="background-color: var(--card-bg); padding: 50px 20px; margin-top: 50px; border-top: 2px solid var(--header-color);">
    <div style="max-width: 600px; margin: 0 auto;">
        <h2 style="text-align: center; color: var(--header-color);">Registrar Nuevo Contenido</h2>
        <form id="mangaForm" style="display: flex; flex-direction: column; gap: 20px;">
            <input type="text" id="titulo" placeholder="Título" required style="padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white;">
            
            <select id="tipo" style="padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white;">
                <option value="manga">Manga (Japón)</option>
                <option value="manhwa">Manhwa (Corea)</option>
                <button class="delete-btn" onclick="this.parentElement.remove()">×</button>
                <option value="manhua">Manhua (China)</option>
                <option value="novela">Novela (Light/Web Novel)</option> </select>
            
            <input type="url" id="portada" placeholder="URL de la Portada" required style="padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white;">
            
            <button type="submit" style="background: linear-gradient(90deg, var(--header-color), var(--accent-color)); color: white; padding: 15px; border: none; border-radius: 30px; font-weight: 700; cursor: pointer; text-transform: uppercase;">Subir a la Biblioteca</button>
        </form>
    </div>
</section>

<script>
    const grid = document.getElementById('mangaGrid');
    const loader = document.getElementById('loader');
    const themeBtn = document.getElementById('theme-toggle');

    // MODO NOCHE
    themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('light-mode');
        themeBtn.textContent = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
    });

    // BUSCADOR
    document.getElementById('buscador').addEventListener('keyup', (e) => {
        const term = e.target.value.toLowerCase();
        document.querySelectorAll('.manga-card').forEach(card => {
            const title = card.querySelector('h3').textContent.toLowerCase();
            card.style.display = title.includes(term) ? "block" : "none";
        });
    });

    // FILTROS
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelector('.filter-btn.active').classList.remove('active');
            btn.classList.add('active');
            
            const filtro = btn.getAttribute('data-filter');
            grid.style.display = 'none';
            loader.style.display = 'block';

            setTimeout(() => {
                loader.style.display = 'none';
                grid.style.display = 'grid';
                document.querySelectorAll('.manga-card').forEach(card => {
                    const tags = card.getAttribute('data-tags') || "";
                    card.style.display = (filtro === 'all' || tags.includes(filtro)) ? "block" : "none";
                });
            }, 400);
        });
    });

    // FORMULARIO
    document.getElementById('mangaForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const t = document.getElementById('titulo').value;
        const type = document.getElementById('tipo').value;
        const p = document.getElementById('portada').value;

        const nuevaCard = document.createElement('div');
        nuevaCard.classList.add('manga-card');
        // Importante: El tag debe ser el mismo que el filtro para que funcione
        nuevaCard.setAttribute('data-tags', type); 

        nuevaCard.innerHTML = `
            <img src="${p}" onerror="this.src='https://via.placeholder.com/200x320?text=Error'">
            <div class="manga-info">
                <span class="badge">${type}</span>
                <h3>${t}</h3>
                <p>Recién Agregado</p>
                <a href="#" class="btn-read">Leer Ahora</a>
            </div>
        `;
        grid.prepend(nuevaCard);
        this.reset();
        alert('¡Contenido subido!');
    });
</script>
</body>
</html>
